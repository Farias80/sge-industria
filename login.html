<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGE · Entrar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --navy-900:#0E1638;--navy-800:#141F4D;--indigo-600:#5B4FE8;--indigo-500:#6E63EE;
  --bg:#EEF1F8;--card:#FFFFFF;--border:#E1E4F0;--text:#161A3B;--text-muted:#6A6F94;
  --danger:#DC3630;--danger-50:#FCEAE9;--radius:14px;
  --shadow:0 1px 2px rgba(20,25,70,.04), 0 8px 24px -12px rgba(20,25,70,.12);
}
*{box-sizing:border-box;}
body{
  margin:0;min-height:100vh;background:linear-gradient(180deg,var(--navy-800),var(--navy-900));
  background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.05) 1px, transparent 1.5px), linear-gradient(180deg,var(--navy-800),var(--navy-900));
  background-size:14px 14px, auto;
  font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;
}
.box{
  background:var(--card);border-radius:var(--radius);box-shadow:0 30px 80px -30px rgba(0,0,0,.5);
  padding:36px 32px;max-width:380px;width:100%;
}
h1{font-family:'Sora',sans-serif;font-weight:800;font-size:22px;color:var(--navy-900);margin:0 0 4px;}
.sub{font-size:13px;color:var(--text-muted);margin-bottom:26px;}
label{font-family:'Sora',sans-serif;font-weight:700;font-size:12.5px;color:var(--navy-900);display:block;margin-bottom:6px;}
input{
  width:100%;padding:11px 13px;border-radius:9px;border:1px solid var(--border);font-size:14px;
  color:var(--text);margin-bottom:16px;font-family:'Inter',sans-serif;
}
input:focus{outline:2px solid var(--indigo-500);outline-offset:1px;border-color:transparent;}
button{
  width:100%;background:var(--indigo-600);color:#fff;border:none;padding:12px;border-radius:10px;
  font-family:'Sora',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:background .15s ease;
}
button:hover{background:var(--indigo-500);}
button:disabled{opacity:.6;cursor:not-allowed;}
.error{
  background:var(--danger-50);color:var(--danger);border:1px solid #F6D3D1;border-radius:9px;
  padding:10px 12px;font-size:12.5px;margin-bottom:16px;display:none;
}
.error.show{display:block;}
.foot{text-align:center;margin-top:18px;font-size:11.5px;color:var(--text-muted);}
</style>
</head>
<body>

<div class="box">
  <h1>SGE</h1>
  <div class="sub">Entre com seu e-mail e senha cadastrados pelo administrador.</div>
  <div class="error" id="errorBox"></div>
  <form id="formLogin">
    <label for="email">E-mail</label>
    <input type="email" id="email" required autocomplete="username">
    <label for="senha">Senha</label>
    <input type="password" id="senha" required autocomplete="current-password">
    <button type="submit" id="btnEntrar">Entrar</button>
  </form>
  <div class="foot">Sistema de Gestão · SGE</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js"></script>
<script>
(async function(){
  // Se já está logado, manda direto para o destino
  const { data } = await window.sgeSupabase.auth.getSession();
  if(data && data.session){
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('next') || 'modulo-00.html';
  }
})();

const form = document.getElementById('formLogin');
const errorBox = document.getElementById('errorBox');
const btn = document.getElementById('btnEntrar');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Entrando…';
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const { error } = await window.sgeSupabase.auth.signInWithPassword({ email, password: senha });
  btn.disabled = false;
  btn.textContent = 'Entrar';
  if(error){
    errorBox.textContent = error.message === 'Invalid login credentials'
      ? 'E-mail ou senha incorretos.'
      : error.message;
    errorBox.classList.add('show');
    return;
  }
  const params = new URLSearchParams(window.location.search);
  window.location.href = params.get('next') || 'modulo-00.html';
});
</script>

</body>
</html>
